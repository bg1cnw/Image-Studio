name: Live Verify Platform Kernel

on:
  workflow_dispatch:

jobs:
  live-verify:
    name: Live verify upstream and worker parity
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cloudflare-worker/package-lock.json

      - name: Run live verify
        env:
          IMAGE_STUDIO_UPSTREAM_BASE_URL: ${{ secrets.IMAGE_STUDIO_UPSTREAM_BASE_URL }}
          IMAGE_STUDIO_API_KEY: ${{ secrets.IMAGE_STUDIO_API_KEY }}
          IMAGE_STUDIO_TEXT_MODEL_ID: ${{ secrets.IMAGE_STUDIO_TEXT_MODEL_ID }}
          IMAGE_STUDIO_IMAGE_MODEL_ID: ${{ secrets.IMAGE_STUDIO_IMAGE_MODEL_ID }}
          IMAGE_STUDIO_VERIFY_RESULTS_DIR: .tmp/live-verify-results
        run: node ./scripts/live-verify.mjs

      - name: Upload live verify results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-verify-platform-kernel-results
          path: .tmp/live-verify-results
          if-no-files-found: warn

      - name: Render live verify job summary
        if: always()
        run: |
          if [ -f .tmp/live-verify-results/live-verify.json ]; then
            node ./scripts/render-live-verify-summary.mjs .tmp/live-verify-results/live-verify.json >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Live Verify Platform Kernel"
              echo
              echo "- result file missing: \`.tmp/live-verify-results/live-verify.json\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
